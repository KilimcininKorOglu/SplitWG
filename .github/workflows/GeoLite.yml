name: GeoLite-DB-Auto-Updater

on:
  repository_dispatch:
    types: [geolite-refresh]
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download GeoLite .mmdb files
        run: |
          set -euo pipefail
          mkdir -p Geolite-DB
          for ed in GeoLite2-ASN GeoLite2-City GeoLite2-Country; do
            wget -nv -O "${ed}.tar.gz" \
              "https://download.maxmind.com/app/geoip_download?edition_id=${ed}&license_key=${{ secrets.LICENSE_KEY }}&suffix=tar.gz"
            tar -xzf "${ed}.tar.gz"
            mv ${ed}_*/${ed}.mmdb Geolite-DB/
            rm -rf ${ed}_*/ "${ed}.tar.gz"
          done
          ( cd Geolite-DB && shasum -a 256 *.mmdb > SHA256SUMS )
          date -u +"%Y-%m-%dT%H:%M:%SZ" > Geolite-DB/UPDATED_AT

      - name: Publish to geodb branch
        run: |
          set -euo pipefail
          mkdir stage
          cp -R Geolite-DB stage/
          cat > stage/README.md <<EOF
          # GeoLite DB cache

          Generated by GitHub Actions daily at 07:00 Europe/Istanbul.
          Consumed by SplitWG runtime; do not modify manually.
          Last update: $(cat Geolite-DB/UPDATED_AT)
          EOF
          cd stage
          git init -b geodb
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "GeoLite2 refresh $(cat Geolite-DB/UPDATED_AT)"
          git remote add origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin geodb
