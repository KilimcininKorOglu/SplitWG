<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" role="img" aria-label="SplitWG — disconnected tray (template)">
  <title>SplitWG — disconnected (template icon)</title>
  <!--
    Template-safe tray glyph (disconnected state).
    Outline shield keeps the silhouette; same include-dots-left / exclude-
    dashes-right asymmetry as connected, just rendered as strokes+fills
    over a hollow shield so the menu bar can tell the two states apart.
  -->
  <g fill="black" stroke="black" stroke-linejoin="round" stroke-linecap="round">
    <path d="M22 3 L7 8 V22 C7 31 13 38 22 41 C31 38 37 31 37 22 V8 Z"
          fill="none" stroke-width="2.2"/>
    <line x1="22" y1="9" x2="22" y2="36" stroke-width="1.4"/>
    <!-- left half: include dots -->
    <circle cx="14" cy="17" r="1.3" stroke="none"/>
    <circle cx="14" cy="23" r="1.3" stroke="none"/>
    <circle cx="14" cy="29" r="1.3" stroke="none"/>
    <!-- right half: exclude dashes -->
    <line x1="26" y1="17" x2="31" y2="17" stroke-width="1.4"/>
    <line x1="26" y1="23" x2="31" y2="23" stroke-width="1.4"/>
    <line x1="26" y1="29" x2="31" y2="29" stroke-width="1.4"/>
  </g>
</svg>
