<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="SplitWG — Split Shield">
  <title>SplitWG — Split Shield</title>
  <defs>
    <linearGradient id="ss-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2ecc71"/>
      <stop offset="1" stop-color="#1e8449"/>
    </linearGradient>
    <linearGradient id="ss-right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3498db"/>
      <stop offset="1" stop-color="#1b4f72"/>
    </linearGradient>
  </defs>

  <!-- Shield silhouette (classic VPN aesthetic) -->
  <path d="M256 36 L104 96 V248 C104 356 168 438 256 476 C344 438 408 356 408 248 V96 Z"
        fill="#0f172a"/>

  <!-- Left half: "included" routing (solid) -->
  <clipPath id="ss-clip-left">
    <path d="M256 36 L104 96 V248 C104 356 168 438 256 476 V36 Z"/>
  </clipPath>
  <g clip-path="url(#ss-clip-left)">
    <rect x="0" y="0" width="512" height="512" fill="url(#ss-left)"/>
    <circle cx="180" cy="188" r="12" fill="#eafaf1"/>
    <circle cx="180" cy="268" r="12" fill="#eafaf1"/>
    <circle cx="180" cy="348" r="12" fill="#eafaf1"/>
  </g>

  <!-- Right half: "excluded" routing (dashed bypass) -->
  <clipPath id="ss-clip-right">
    <path d="M256 36 V476 C344 438 408 356 408 248 V96 Z"/>
  </clipPath>
  <g clip-path="url(#ss-clip-right)">
    <rect x="0" y="0" width="512" height="512" fill="url(#ss-right)"/>
    <path d="M296 188 H388 M296 268 H388 M296 348 H388"
          stroke="#ecf6fd" stroke-width="14" stroke-linecap="round" stroke-dasharray="4 18"/>
  </g>

  <!-- Split seam -->
  <path d="M256 36 V476" stroke="#f5f7fa" stroke-width="6" stroke-linecap="round"/>

  <!-- Shield outline -->
  <path d="M256 36 L104 96 V248 C104 356 168 438 256 476 C344 438 408 356 408 248 V96 Z"
        fill="none" stroke="#f5f7fa" stroke-width="10" stroke-linejoin="round"/>
</svg>
