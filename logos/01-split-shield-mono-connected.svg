<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" role="img" aria-label="SplitWG — connected tray (template)">
  <title>SplitWG — connected (template icon)</title>
  <!--
    Template-safe tray glyph (connected state).
    Alpha-only: macOS recolours the shape to match the menu bar.
    Mirrors 01-split-shield's asymmetry — left half = include dots,
    right half = exclude dashes — so the brand reads even at 22 pt.
  -->
  <defs>
    <mask id="cuts-c" maskUnits="userSpaceOnUse">
      <rect width="44" height="44" fill="white"/>
      <!-- split seam -->
      <rect x="21.2" y="10" width="1.6" height="25" fill="black"/>
      <!-- left half: include dots (3 stacked) -->
      <circle cx="14" cy="17" r="1.4" fill="black"/>
      <circle cx="14" cy="23" r="1.4" fill="black"/>
      <circle cx="14" cy="29" r="1.4" fill="black"/>
      <!-- right half: exclude dashes (short horizontal strokes) -->
      <rect x="25.5" y="16.2" width="6" height="1.6" rx="0.8" fill="black"/>
      <rect x="25.5" y="22.2" width="6" height="1.6" rx="0.8" fill="black"/>
      <rect x="25.5" y="28.2" width="6" height="1.6" rx="0.8" fill="black"/>
    </mask>
  </defs>
  <path d="M22 3 L7 8 V22 C7 31 13 38 22 41 C31 38 37 31 37 22 V8 Z"
        fill="black" mask="url(#cuts-c)"/>
</svg>
